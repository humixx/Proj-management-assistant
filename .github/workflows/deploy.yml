name: Deploy Backend to EC2

on:
  push:
    branches: [master]
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Backend to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e
            cd /var/www/Proj-management-assistant

            echo "🧹 Resetting local changes..."
            git reset --hard HEAD
            git clean -fd -e backend/venv

            echo "📥 Pulling latest code..."
            git pull origin master

            echo "🐍 Updating backend..."
            cd backend
            source venv/bin/activate
            pip install -r requirements.txt --quiet

            echo "🗄️ Running migrations..."
            alembic upgrade head || echo "No new migrations"

            echo "🔄 Restarting service..."
            sudo systemctl restart Proj-management-assistant-api

            echo "✅ Backend deployment complete!"

      - name: Verify deployment
        run: |
          sleep 10
          curl -s http://${{ secrets.EC2_HOST }}:8000/health && echo "✅ Backend healthy!" || echo "⚠️ Check deployment"